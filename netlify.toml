[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/delete"
  to = "/delete.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
